name: "Continuous Integration"

on:
  pull_request: null
  push:
    branches:
      - "*.x"
      - "master"
  schedule:
    - cron: "42 3 * * 1"

jobs:
  phpunit-mysql:
    name: ${{ matrix.job }}${{ matrix.name }} (PHP ${{ matrix.php-version }} / MySQL ${{ matrix.mysql-version }})
    runs-on: "ubuntu-24.04"

    strategy:
      matrix:
        php-version:
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
        mysql-version:
          - "8.0"
        dependencies:
          - "highest"
        composer-options: 
          - "--prefer-dist"
        job:
          - Tests
        # https://stackoverflow.com/questions/78445419/unknown-variable-default-authentication-plugin-mysql-native-password
        custom-entrypoint:
          - --entrypoint sh mysql:8 -c "exec docker-entrypoint.sh mysqld --mysql-native-password=ON"
        include:
          - php-version: "8.2"
            mysql-version: "5.7"
          - php-version: "8.3"
            mysql-version: "8.0"
            job: Infection
          - dependencies: "lowest"
            php-version: "8.1"
            mysql-version: "5.7"
            name: Lowest deps

    services:
      mysql:
        image: "mysql:${{ matrix.mysql-version }}"

        options: >-
          --health-cmd "mysqladmin ping --silent"
          -e MYSQL_ALLOW_EMPTY_PASSWORD=yes
          -e MYSQL_DATABASE=test
          ${{ matrix.custom-entrypoint }}
        ports:
          - "3306:3306"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"
        with:
          fetch-depth: 2

      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          php-version: "${{ matrix.php-version }}"
          coverage: "pcov"
          ini-values: "zend.assertions=1"
          extensions: "mysqli, pdo_mysql"

      - name: Remove unneeded dependencies
        if: matrix.php-version == '8.1'
        run: |-
          composer remove --dev --no-update \
            facile-it/facile-coding-standard \
            psalm/plugin-phpunit \
            vimeo/psalm

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: ${{ matrix.dependencies }}
          composer-options: ${{ matrix.composer-options }}

      - name: "Run PHPUnit with coverage"
        run: "vendor/bin/phpunit -c ci/github/phpunit/phpunit.xml --coverage-clover=coverage.xml"
        if: matrix.job == 'Tests'

      - name: "Run mutation testing with Infection"
        run: "vendor/bin/roave-infection-static-analysis-plugin --ansi --show-mutations"
        if: matrix.job == 'infection'

      - name: Upload code coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
        if: matrix.job == 'Tests'

  quality-checks:
    runs-on: ubuntu-24.04
    name: ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - name: Rector + Code style
            commandName: Run Rector + code style check
            command: vendor/bin/rector --ansi --dry-run && vendor/bin/php-cs-fixer fix --dry-run --ansi --verbose
          - name: Psalm
            commandName: Run Psalm analysis
            command: vendor/bin/psalm --show-info=true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
          composer-options: --prefer-dist

      - name: ${{ matrix.commandName }}
        run: ${{ matrix.command }}
